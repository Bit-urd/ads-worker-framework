# 选择浏览器平台: adspower 或 multiloginx
platform: adspower

# AdsPower 配置
adspower:
  url: http://localhost:50325
  api_key: ""  # 可选

# MultiloginX 配置
multiloginx:
  launcher_url: https://launcher.mlx.yt:45001
  token: ""  # 你的 API token
  folder_id: default  # 默认文件夹 ID

# 并发数
concurrency: 3

# 分配模式: fixed (固定绑定) 或 pool (账号池动态分配)
mode: fixed

# 账号配置示例
accounts:
  - name: account1
    profile_id: "your-profile-id-1"
    # 如果使用 multiloginx，可以指定 folder_id（可选）
    # folder_id: "your-folder-id"
    
  - name: account2
    profile_id: "your-profile-id-2"
